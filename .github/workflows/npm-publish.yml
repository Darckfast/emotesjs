name: Node.js Package

on:
  release:
    types: [created]

jobs:
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
