[tools]
node = "26"
pnpm = "10.33"

[tasks.prepare]
run = "pnpm install"

[tasks.build]
depends = ["prepare"]
run = "pnpx tsup && pnpx terser ./dist/index.js -o ./dist/index.js"

[tasks.test]
depends = ["prepare"]
run = "pnpm run test"

[tasks.publish]
depends = ["prepare"]
run = "pnpm publish --access public --no-git-checks"
